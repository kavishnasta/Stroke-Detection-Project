name: stroke_detection_app
description: FAST Stroke Detection — real-time face & speech analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebSocket communication with backend
  web_socket_channel: ^2.4.5

  # Camera frame capture
  camera: ^0.10.5+9

  # Microphone recording at 16 kHz WAV
  record: ^5.1.2

  # Runtime permissions (camera + microphone)
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Persistent server IP storage
  shared_preferences: ^2.3.2

  # Temp directory for audio chunk files
  path_provider: ^2.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
